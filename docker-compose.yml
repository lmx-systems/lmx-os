version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lmx_os}
      POSTGRES_USER: ${POSTGRES_USER:-lmx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      # Bound to localhost only - this compose file's default POSTGRES_PASSWORD
      # is a well-known placeholder, so publishing this to every interface
      # would put it one firewall misconfiguration away from an internet-
      # reachable database (docs/ROADMAP.md S6). The app container still
      # reaches it fine over the internal compose network regardless.
      - "127.0.0.1:5432:5432"
    volumes:
      - lmx_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lmx}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # Bound to localhost only - this Redis instance has no auth at all,
      # and holds fleet state, the hold queue, and rate-limit counters
      # (docs/ROADMAP.md S6). Reachable internally over the compose network
      # regardless of this binding.
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lmx}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-lmx_os}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"

  dashboard:
    build:
      context: ./dashboard
    environment:
      # Read at *container* startup by docker/generate-env-config.sh, not
      # baked into the image (docs/ROADMAP.md D2) - override and just
      # restart the container to point at a different API, no rebuild.
      DASHBOARD_API_BASE_URL: ${DASHBOARD_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - app
    ports:
      - "5173:80"

  client-portal:
    build:
      context: ./client-portal
    environment:
      # Read at *container* startup by docker/generate-env-config.sh, not
      # baked into the image (docs/ROADMAP.md D2). No ops-login credential
      # here, unlike dashboard - /client/* has its own real per-client JWT
      # auth (app/client_auth/), a separate auth domain from the ops
      # dashboard's login.
      CLIENT_PORTAL_API_BASE_URL: ${CLIENT_PORTAL_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - app
    ports:
      - "5174:80"

volumes:
  lmx_pg_data:
